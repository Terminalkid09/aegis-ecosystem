services:
  aegis-postgres:
    image: postgres:16-alpine
    container_name: aegis-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-aegis}
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-aegis}"]
      interval: 5s
      timeout: 5s
      retries: 5

  aegis-redis:
    image: redis:7-alpine
    container_name: aegis-redis
    restart: unless-stopped
    command: ["sh", "-c", "redis-server --appendonly yes --requirepass \"$${REDIS_PASSWORD}\""]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-aegis_redis_pass}
    ports:
      - "${REDIS_PORT_EXTERNAL:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 5

  aegis-ollama:
    image: ollama/ollama:latest
    container_name: aegis-ollama
    profiles: ["ollama"]
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT_EXTERNAL:-11434}:11434"
    environment:
      OLLAMA_KEEP_ALIVE: 30m
      OLLAMA_CONTEXT_LENGTH: 2048
    volumes:
      - ollama_data:/root/.ollama

  aegis-brain:
    build: ./aegis-brain
    container_name: aegis-brain
    restart: unless-stopped
    ports:
      - "${BRAIN_PORT_EXTERNAL:-8000}:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:password@aegis-postgres:5432/aegis}
      REDIS_URL: redis://:${REDIS_PASSWORD:-aegis_redis_pass}@aegis-redis:6379
      REDIS_HOST: aegis-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-aegis_redis_pass}
      AEGIS_API_KEY: ${AEGIS_API_KEY:-aegis_dev_api_key_change_me}
      AGENT_ENROLL_KEY: ${AGENT_ENROLL_KEY:-aegis-enrollment-tokenFor_v3.0.0}
      JWT_SECRET: ${JWT_SECRET:-aegis-dev-jwt-secret-change-me-32-chars}
      MASTER_KEY_B64: ${MASTER_KEY_B64:-Q/wCZ5reU82bQpZppUc6Qq80sybBPz4Q276NbMBF97Q=}
      OLLAMA_URL: http://aegis-ollama:11434/api/generate
      OLLAMA_DEFAULT_MODEL: llama3
      SHODAN_API_KEY: ${SHODAN_API_KEY}
      ABUSEIPDB_API_KEY: ${ABUSEIPDB_API_KEY}
    depends_on:
      aegis-postgres:
        condition: service_healthy
      aegis-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/ || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5

  aegis-link:
    build: ./aegis-link
    container_name: aegis-link
    restart: unless-stopped
    ports:
      - "${LINK_PORT_EXTERNAL:-8080}:8080"
      - "1514:1514/udp"
    environment:
      SPRING_DATA_REDIS_HOST: aegis-redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-aegis_redis_pass}
      AEGIS_API_KEY: ${AEGIS_API_KEY:-aegis_dev_api_key_change_me}
    depends_on:
      aegis-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5

  aegis-guard:
    build: ./aegis-guard
    container_name: aegis-guard
    profiles: ["container-agents"]
    restart: unless-stopped
    environment:
      AEGIS_AGENT_ID: ${AEGIS_AGENT_ID:-agent-001}
      AEGIS_GATEWAY_URL: http://aegis-brain:8000/api/v1/telemetry/report
      AEGIS_BRAIN_URL: http://aegis-brain:8000/api/v1
      AEGIS_ENROLL_KEY: ${AGENT_ENROLL_KEY:-aegis-enrollment-tokenFor_v3.0.0}
      AEGIS_SECRET_FILE: /app/data/secret.json
      AEGIS_SCAN_INTERVAL_MS: ${AEGIS_SCAN_INTERVAL_MS:-1000}
    volumes:
      - guard_data:/app/data
    depends_on:
      aegis-link:
        condition: service_healthy
      aegis-brain:
        condition: service_healthy

  aegis-frontend:
    build: ./frontend
    container_name: aegis-frontend
    profiles: ["frontend-docker"]
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
    environment:
      - REACT_APP_API_URL=http://localhost:8000/api/v1
      - WDS_SOCKET_PORT=0
    depends_on:
      - aegis-brain

volumes:
  postgres_data:
  redis_data:
  ollama_data:
  guard_data:
  nodetrace_data:
