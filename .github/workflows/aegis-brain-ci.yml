name: Aegis Brain CI

on:
  push:
    paths:
      - "aegis-brain/**"
      - ".github/workflows/aegis-brain-ci.yml"
  pull_request:
    paths:
      - "aegis-brain/**"
      - ".github/workflows/aegis-brain-ci.yml"

defaults:
  run:
    working-directory: aegis-brain

env:
  DEBUG: "true"
  JWT_SECRET: test_jwt_secret_for_testing_only_32_chars_minimum_length
  AGENT_ENROLL_KEY: test_enrollment_token_16_chars_min
  MASTER_KEY_B64: Q/wCZ5reU82bQpZppUc6Qq80sybBPz4Q276NbMBF97Q=
  ALLOWED_ORIGINS: http://localhost:3000

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: aegis-brain/requirements.txt
      - run: pip install -r requirements.txt ruff mypy
      - run: ruff check app/ tests/
      - run: mypy app/ --ignore-missing-imports

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: aegis-brain/requirements.txt
      - run: pip install -r requirements.txt
      - run: pytest tests/ -v --tb=short -k "not integration" --cov=app --cov-report=term-missing

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: aegis_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d aegis_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: aegis-brain/requirements.txt
      - run: pip install -r requirements.txt
      - run: pytest tests/integration/ -v --tb=short
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5432/aegis_test
          REDIS_URL: redis://localhost:6379
          REDIS_PASSWORD: ""
          OLLAMA_URL: http://localhost:11434/api/generate

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend

  docker-build:
    name: Build Brain Image
    needs: [lint-and-typecheck, unit-tests, integration-tests, frontend-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: aegis-brain
          push: false
          tags: aegis-brain:ci
