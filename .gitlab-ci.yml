stages:
  - build
  - test
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  JAVA_VERSION: '21'
  PYTHON_VERSION: '3.12'

# BUILD STAGE
build_aegis_guard:
  stage: build
  image: maven:3.9.6-eclipse-temurin-21
  script:
    - cd aegis-guard
    - mvn clean package -DskipTests
  artifacts:
    paths:
      - aegis-guard/target/*.jar

build_aegis_brain:
  stage: build
  image: python:$PYTHON_VERSION
  script:
    - cd aegis-brain
    - pip install -r requirements.txt
  artifacts:
    paths:
      - aegis-brain/

build_frontend:
  stage: build
  image: node:18
  script:
    - cd frontend
    - npm install
    - npm run build
  artifacts:
    paths:
      - frontend/build/

# TEST STAGE
test_aegis_brain:
  stage: test
  image: python:$PYTHON_VERSION
  services:
    - postgres:16-alpine
    - redis:7-alpine
  variables:
    POSTGRES_DB: aegis_test
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: password
    DATABASE_URL: "postgresql+asyncpg://postgres:password@postgres:5432/aegis_test"
    REDIS_URL: "redis://redis:6379"
  script:
    - cd aegis-brain
    - pip install -r requirements.txt
    - pytest

# DEPLOY STAGE (Example)
deploy_staging:
  stage: deploy
  script:
    - echo "Deploying to staging environment..."
  only:
    - main
