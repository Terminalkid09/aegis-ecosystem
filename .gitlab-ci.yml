stages:
  - lint
  - build
  - test
  - security
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  JAVA_VERSION: '21'
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '18'

# LINT STAGE
lint_frontend:
  stage: lint
  image: node:$NODE_VERSION
  script:
    - cd frontend
    - npm install
    - npm run lint
  allow_failure: true

lint_brain:
  stage: lint
  image: python:$PYTHON_VERSION
  script:
    - cd aegis-brain
    - pip install -r requirements.txt flake8
    - flake8 app/ --max-line-length=120 --exclude=__pycache__,migrations
  allow_failure: true

# BUILD STAGE
build_aegis_guard:
  stage: build
  image: maven:3.9.6-eclipse-temurin-21
  script:
    - cd aegis-guard
    - mvn clean package -DskipTests
  artifacts:
    paths:
      - aegis-guard/target/*.jar

build_aegis_brain:
  stage: build
  image: python:$PYTHON_VERSION
  script:
    - cd aegis-brain
    - pip install -r requirements.txt
  artifacts:
    paths:
      - aegis-brain/

build_frontend:
  stage: build
  image: node:$NODE_VERSION
  script:
    - cd frontend
    - npm install
    - npm run build
  artifacts:
    paths:
      - frontend/build/

# TEST STAGE
test_aegis_brain:
  stage: test
  image: python:$PYTHON_VERSION
  services:
    - postgres:16-alpine
    - redis:7-alpine
  variables:
    POSTGRES_DB: aegis_test
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: password
    DATABASE_URL: "postgresql+asyncpg://postgres:password@postgres:5432/aegis_test"
    REDIS_URL: "redis://redis:6379"
  script:
    - cd aegis-brain
    - pip install -r requirements.txt
    - pytest --import-mode=importlib -v

# SECURITY STAGE
security_scan:
  stage: security
  image: python:$PYTHON_VERSION
  script:
    - cd aegis-brain
    - pip install -r requirements.txt bandit
    - bandit -r app/ -x app/tests -ll
  allow_failure: true

# DEPLOY STAGE (Example)
deploy_staging:
  stage: deploy
  script:
    - echo "Deploying to staging environment..."
  only:
    - main
