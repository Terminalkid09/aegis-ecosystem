# ─── Server ───────────────────────────────────────────────────────────────────
server.port=8080

# ─── Applicazione ─────────────────────────────────────────────────────────────
spring.application.name=aegis-link

# ─── Redis ────────────────────────────────────────────────────────────────────
# Host e porta di Redis. In Docker Compose il container si chiama "aegis-redis".
# In locale usa "localhost". Override tramite variabile d'ambiente:
#   SPRING_DATA_REDIS_HOST=aegis-redis
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}

# Timeout connessione a Redis (ms)
spring.data.redis.timeout=2000ms

# ─── Actuator ─────────────────────────────────────────────────────────────────
# Espone solo /actuator/health per i Docker health check
# Non esporre "env" o "beans" in produzione (information leakage)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ─── Security ─────────────────────────────────────────────────────────────────
# Chiave API per l'autenticazione degli agenti. 
# Deve essere fornita tramite variabile d'ambiente AEGIS_API_KEY.
aegis.api.key=${AEGIS_API_KEY}

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.aegis=${AEGIS_LOG_LEVEL:INFO}
