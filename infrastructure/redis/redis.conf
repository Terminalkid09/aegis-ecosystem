# Redis configuration per Aegis EDR
bind 0.0.0.0
port 6379

# Password authentication
# NOTE: In Docker Compose, password is set via --requirepass on the command line.
# If mounting this file manually, set the password here:
requirepass aegis_redis_pass

# Persistenza AOF
appendonly yes
appendfilename "aegis-redis.aof"
appendfsync everysec

# Memoria
maxmemory 256mb
maxmemory-policy allkeys-lru

# Performance
save ""
timeout 0
tcp-keepalive 300
loglevel notice
